      body.details-page {
        background: var(--background-color);
        color: var(--default-color);
      }

      .details-topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: color-mix(in srgb, var(--background-color), transparent 5%);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid

      .details-topbar .inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .details-topbar .brand {

        font-weight: 700;
        font-size: 18px;
        color: var(--heading-color);
        text-decoration: none;

      .details-topbar .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--accent-color);
        text-decoration: none;
      }

      .details-topbar .back-link:hover {

        font-weight: 600;

        text-decoration: none;

      .btn-primary-cta:hover {
        background: color-mix(in srgb, var(--accent-color), black 15%);
        transform: translateY(-2px);

      }

      .btn-ghost-cta {
        border: 2px solid

        color: var(--default-color);
      }

      .btn-ghost-cta:hover {
        border-color: var(--accent-color);
        color: var(--accent-color);
      }

        width: 100%;
        border-radius: 14px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.16);
        margin-bottom: 44px;
      }

      .details-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 44px;
      }

      @media (max-width: 768px) {

          grid-template-columns: 1fr;
          gap: 30px;
        }
      }

        font-weight: 700;
        color: var(--heading-color);
        margin: 0 0 16px;

        line-height: 1.75;
        margin-bottom: 18px;

        list-style: none;
        padding: 0;
        margin: 0 0 10px;
      }

        position: relative;
        padding-left: 30px;
        margin-bottom: 14px;
        line-height: 1.65;
      }

      .details-body ul.highlights li::before {
        content: "\F26B";
        font-family: "bootstrap-icons";
        position: absolute;
        left: 0;
        top: 1px;
        color: var(--accent-color);
        font-size: 17px;

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function renderProject(p) {
        document.title = p.title + " — Victor Nnamani";

        const highlights = p.highlights
          .map((h) => "<li>" + escapeHtml(h) + "</li>")
          .join("");

        const stack = p.stack
          .map((s) => "<span>" + escapeHtml(s) + "</span>")
          .join("");

        return `
          <div class="details-wrap">
            <p class="eyebrow">${escapeHtml(p.eyebrow)}</p>
            <h1>${escapeHtml(p.title)}</h1>
            <p class="lede">${escapeHtml(p.lede)}</p>

            <div class="details-actions">
              <a class="btn-primary-cta" href="${p.live}" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-box-arrow-up-right"></i> Visit Live Site
              </a>
              <a class="btn-ghost-cta" href="index.html#portfolio">
                <i class="bi bi-grid"></i> All Projects
              </a>
            </div>

            <img class="details-hero-img" src="${p.image}" alt="${escapeHtml(
          p.title
        )} screenshot" />

            <div class="details-grid">
              <div class="details-body">
                <h2>Overview</h2>
                <p>${escapeHtml(p.overview)}</p>
                <h2>What I Built</h2>
                <ul class="highlights">${highlights}</ul>
              </div>

              <aside class="details-aside">
                <div class="aside-card">
                  <h3>Project Info</h3>
                  <div class="meta-row"><span>Category</span><span>${escapeHtml(
                    p.category
                  )}</span></div>
                  <div class="meta-row"><span>Role</span><span>${escapeHtml(
                    p.role
                  )}</span></div>
                  <div class="meta-row"><span>Timeline</span><span>${escapeHtml(
                    p.timeline
                  )}</span></div>
                  <div class="meta-row"><span>Context</span><span>${escapeHtml(
                    p.context
                  )}</span></div>
                </div>
                <div class="aside-card">
                  <h3>Tech Stack</h3>
                  <div class="stack-tags">${stack}</div>
                </div>
              </aside>
            </div>
          </div>
        `;
      }

      function renderNotFound() {
        return `
          <div class="details-wrap details-notfound">
            <h1>Project not found</h1>
            <p class="lede" style="margin-inline:auto;">
              The project you're looking for doesn't exist or may have moved.
            </p>
            <a class="btn-primary-cta" href="index.html#portfolio">
              <i class="bi bi-arrow-left"></i> Back to Projects
            </a>
          </div>
        `;
      }

      function getSlug() {
        // Prefer the hash (#slug) — it survives clean-URL redirects on any
        // static host; fall back to the ?project= query param for safety.
        const hash = window.location.hash.replace(/^#/, "").trim();
        if (hash) return hash;
        return new URLSearchParams(window.location.search).get("project");
      }

      function render() {
        const slug = getSlug();
        const project = slug ? PROJECTS[slug] : null;
        document.getElementById("details-root").innerHTML = project
          ? renderProject(project)
          : renderNotFound();
        window.scrollTo(0, 0);
      }

      render();
      // Re-render if the user navigates between projects via hash change.
      window.addEventListener("hashchange", render);
